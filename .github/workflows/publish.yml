name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - run: chmod +x gradlew

      - name: Gradle Publish
        run: ./gradlew publish

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.MAVEN_TOKEN }}
          external_repository: sucj/.m2
          publish_branch: repository
          publish_dir: ./build/repository
          keep_files: true
          destination_dir: public
          exclude_assets: '**/maven-metadata.xml,**/maven-metadata.xml.*'